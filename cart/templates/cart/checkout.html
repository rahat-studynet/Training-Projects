<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>

    <style>
        /* Basic page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Page background */
        body {
            background-color: #f4f6f9;
            padding: 40px;
            color: #333;
        }

        /* Main container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Table design */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #7f8c8d;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* Button row */
        .button-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
        }

        .btn-confirm {
            background-color: #2ecc71;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #27ae60;
        }

        .btn-back {
            background-color: #3498db;
            color: white;
        }

        .btn-back:hover {
            background-color: #2980b9;
        }

        .btn-logout {
            background-color: #e74c3c;
            color: white;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Checkout</h1>

    <p>Please review your cart items before confirming checkout.</p>

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Available Stock</th>
            </tr>
        </thead>

        <tbody>
            {% for item in cart_items %}
                <tr>
                    <td>{{ item.product.name }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>{{ item.product.stock }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <form method="POST">
        {% csrf_token %}

        <div class="button-row">
            <button type="submit" class="btn btn-confirm">
                Confirm Checkout
            </button>

            <a href="/my-cart/" class="btn btn-back">
                Back to Cart
            </a>

            <a href="/logout/" class="btn btn-logout">
                Logout
            </a>
        </div>
    </form>
</div>

</body>
</html>
