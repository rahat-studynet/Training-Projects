<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart View</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 40px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
        }

        h2 {
            color: #2c3e50;
        }

        .btn-logout {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-add {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-add:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background-color: #f8f9fa;
            color: #7f8c8d;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        tr:hover {
            background-color: #fdfdfd;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .btn-delete:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .no-data {
            text-align: center;
            padding: 30px;
            color: #95a5a6;
            font-style: italic;
        }

        .message {
            display: none;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.success {
            display: block;
            background-color: #eafaf1;
            color: #1e8449;
            border: 1px solid #abebc6;
        }

        .message.error {
            display: block;
            background-color: #fdecea;
            color: #c0392b;
            border: 1px solid #f5b7b1;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header-section">
        <h2>Your Shopping Cart</h2>

            <div class="button-group">
                <a href="/api/cart/add/" class="btn-add">+ Add New Item</a>
                <a href="/logout/" class="btn-logout">Logout</a>
            </div>
    </div>

    <div id="message-box" class="message"></div>

    <table>
        <thead>
            <tr>
                <th>System ID</th>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Quantity</th>
                <th>Price (BDT)</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="cart-table-body">
        </tbody>
    </table>

    <div id="empty-message" class="no-data" style="display: none;">
        Your cart is empty.
    </div>
</div>

<script>
    // Get CSRF token from browser cookie
    function getCSRFToken() {
        const cookieValue = document.cookie
            .split('; ')
            .find(row => row.startsWith('csrftoken='));

        return cookieValue ? cookieValue.split('=')[1] : '';
    }

    // Show success or error message inside page
    function showMessage(type, message) {
        const messageBox = document.getElementById('message-box');
        messageBox.className = 'message ' + type;
        messageBox.innerText = message;
    }

    

    // Load all cart items from API
    async function loadCartItems() {
        const tableBody = document.getElementById('cart-table-body');
        const emptyMessage = document.getElementById('empty-message');


        tableBody.innerHTML = '';
        emptyMessage.style.display = 'none';

        try {
            const response = await fetch('/api/cart/items/', {
                credentials: 'include'
            });

            const data = await response.json();


            // If API gives error, stop here
            if (!response.ok) {
                showMessage(
                    'error',
                    'Error: ' + (data.error || 'Failed to load cart items.') +
                    '\nSuggestion: ' + (data.suggestion || 'Please login and try again.')
                );
                return;
            }

            // If cart is empty
            if (data.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }

            // Show cart items in table
            data.forEach(item => {
                const row = `
                    <tr>
                        <td><strong>#${item.id}</strong></td>
                        <td>${item.product_id}</td>
                        <td>${item.product_name}</td>
                        <td>${item.quantity}</td>
                        <td>${parseFloat(item.price).toFixed(2)}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteCartItem(${item.id})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;

                tableBody.innerHTML += row;
            });

        } catch (error) {
            console.error('Error loading cart items:', error);

            showMessage(
                'error',
                'Network error. Could not connect to the backend.'
            );
        }
    }

    // Delete cart item by ID
    async function deleteCartItem(id) {
        const confirmDelete = confirm('Are you sure you want to remove this item from your cart?');

        if (!confirmDelete) {
            return;
        }

        try {
            const response = await fetch(`/api/cart/items/${id}/`, {
                method: 'DELETE',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                }
            });

            if (response.ok) {
                showMessage('success', 'Item deleted successfully!');
                loadCartItems();
            } else {
                const errorData = await response.json();

                showMessage(
                    'error',
                    'Error: ' + (errorData.error || 'Failed to delete item.') +
                    '\nSuggestion: ' + (errorData.suggestion || 'Please try again.')
                );
            }

        } catch (error) {
            console.error('Deletion error:', error);

            showMessage(
                'error',
                'Network error occurred while deleting item.'
            );
        }
    }

    // Run when page opens
    window.onload = loadCartItems;
</script>

</body>
</html>
