<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <style>
        /* Basic page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Page background and center alignment */
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Main form card */
        .form-container {
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        /* Form field group */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #7f8c8d;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus,
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Error box */
        .error-box {
            background-color: #fdecea;
            color: #c0392b;
            border: 1px solid #f5b7b1;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Submit button */
        .btn-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }

        /* Link row */
        .link-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-back,
        .btn-logout {
            flex: 1;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-back {
            color: #3498db;
            border: 1px solid #3498db;
        }

        .btn-back:hover {
            background-color: #ecf6fd;
        }

        .btn-logout {
            color: white;
            background-color: #e74c3c;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h1>Add Product</h1>

    <!-- Show form errors -->
    {% if form.errors %}
        <div class="error-box">
            {{ form.errors }}
        </div>
    {% endif %}

    <!-- Product add form -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Product Name</label>
            {{ form.name }}
        </div>

        <div class="form-group">
            <label>Description</label>
            {{ form.description }}
        </div>

        <div class="form-group">
            <label>Product Image</label>
            {{ form.image }}
        </div>

        <div class="form-group">
            <label>Price</label>
            {{ form.price }}
        </div>

        <div class="form-group">
            <label>Stock</label>
            {{ form.stock }}
        </div>

        <button type="submit" class="btn-submit">Save Product</button>
    </form>

    <div class="link-row">
        <a href="/admin-products/" class="btn-back">Back to Products</a>
        <a href="/logout/" class="btn-logout">Logout</a>
    </div>
</div>

</body>
</html>
