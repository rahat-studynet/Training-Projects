<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Item to Cart</title>

    <style>
        /* Modern Layout Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Centralized Card Container */
        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #7f8c8d;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn-submit {
            background-color: #2ecc71;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }

        .btn-submit:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-back:hover {
            text-decoration: underline;
        }

        .message {
            display: none;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.success {
            display: block;
            background-color: #eafaf1;
            color: #1e8449;
            border: 1px solid #abebc6;
        }

        .message.error {
            display: block;
            background-color: #fdecea;
            color: #c0392b;
            border: 1px solid #f5b7b1;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Add New Cart Item</h2>

    <div id="message-box" class="message"></div>

    <form id="add-item-form">
        <div class="form-group">
            <label for="product_id">Product ID</label>
            <input type="number" id="product_id" required placeholder="e.g., 101">
        </div>

        <div class="form-group">
            <label for="product_name">Product Name</label>
            <input type="text" id="product_name" required placeholder="e.g., Smart Watch">
        </div>

        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" required min="1" value="1">
        </div>

        <div class="form-group">
            <label for="price">Price (BDT)</label>
            <input type="number" id="price" required step="0.01" min="0.01" placeholder="e.g., 2500.00">
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">Add to Cart</button>
    </form>

    <a href="/api/cart/view/" class="btn-back">⬅ Back to Cart View</a>
</div>

<script>
    // Get CSRF token from browser cookie
    function getCSRFToken() {
        const cookieValue = document.cookie
            .split('; ')
            .find(row => row.startsWith('csrftoken='));

        return cookieValue ? cookieValue.split('=')[1] : '';
    }

    // Show success or error message inside the page
    function showMessage(type, message) {
        const messageBox = document.getElementById('message-box');
        messageBox.className = 'message ' + type;
        messageBox.innerText = message;
    }

    // Convert API error details into readable text
    function formatErrorDetails(details) {
        if (!details) {
            return '';
        }

        if (typeof details === 'string') {
            return details;
        }

        if (typeof details === 'object') {
            return Object.entries(details)
                .map(([field, errors]) => {
                    if (Array.isArray(errors)) {
                        return `${field}: ${errors.join(', ')}`;
                    }

                    return `${field}: ${errors}`;
                })
                .join('\n');
        }

        return '';
    }

    // Handle form submission
    document.getElementById('add-item-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submit-btn');

        const itemData = {
            product_id: parseInt(document.getElementById('product_id').value),
            product_name: document.getElementById('product_name').value.trim(),
            quantity: parseInt(document.getElementById('quantity').value),
            price: parseFloat(document.getElementById('price').value)
        };

        submitBtn.disabled = true;
        submitBtn.innerText = 'Adding...';

        try {
            const response = await fetch('/api/cart/items/', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                },
                body: JSON.stringify(itemData)
            });

            const result = await response.json();

            if (response.ok) {
                showMessage('success', 'Item added to cart successfully!');

                setTimeout(function() {
                    window.location.href = '/api/cart/view/';
                }, 800);
            } else {
                const detailsText = formatErrorDetails(result.details);

                showMessage(
                    'error',
                    'Error: ' + (result.error || 'Failed to add item.') +
                    '\n' + detailsText +
                    '\nSuggestion: ' + (result.suggestion || 'Please check your input.')
                );
            }

        } catch (error) {
            console.error('Error submitting form:', error);

            showMessage(
                'error',
                'Network error. Could not connect to the backend.'
            );
        }

        submitBtn.disabled = false;
        submitBtn.innerText = 'Add to Cart';
    });
</script>

</body>
</html>
