<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cart System</title>

    <style>
        /* Basic page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Page background */
        body {
            background: linear-gradient(135deg, #eef3f8, #f8fbff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #333;
        }

        /* Main home card */
        .home-container {
            background-color: white;
            width: 100%;
            max-width: 520px;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(31, 59, 77, 0.08);
        }

        /* App icon */
        .app-icon {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            background-color: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 18px;
            font-size: 26px;
            font-weight: bold;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 30px;
        }

        .page-caption {
            color: #7f8c8d;
            margin-bottom: 28px;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Button common style */
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            margin-bottom: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-signup {
            background-color: #2ecc71;
            color: white;
        }

        .btn-signup:hover {
            background-color: #27ae60;
        }

        .btn-signin {
            background-color: #3498db;
            color: white;
        }

        .btn-signin:hover {
            background-color: #2980b9;
        }

        /* Admin panel link */
        .admin-link {
            display: inline-block;
            margin-top: 12px;
            color: #2c3e50;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .admin-link:hover {
            text-decoration: underline;
        }

        /* Footer caption */
        .small-caption {
            margin-top: 22px;
            font-size: 13px;
            color: #95a5a6;
        }
    </style>
</head>

<body>

<div class="home-container">

    <!-- Application logo -->
    <div class="app-icon">C</div>

    <!-- Page title -->
    <h1>Product Cart System</h1>

    <p class="page-caption">
        Admins can manage products, and approved users can add products to cart and checkout.
    </p>

    <!-- Main user actions -->
    <a href="/signup/" class="btn btn-signup">Create New Account</a>
    <a href="/signin/" class="btn btn-signin">Sign In</a>

    <!-- Admin panel shortcut -->
    <a href="/admin/" class="admin-link">Admin Panel</a>

    <p class="small-caption">
        New users need admin approval before signing in.
    </p>

</div>

</body>
</html>
