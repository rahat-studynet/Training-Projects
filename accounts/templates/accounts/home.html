<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart System Home</title>

    <style>
        /* Basic page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Page background and center alignment */
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Main card design */
        .home-container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* Button common style */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        /* Signup button */
        .btn-signup {
            background-color: #2ecc71;
            color: white;
        }

        .btn-signup:hover {
            background-color: #27ae60;
        }

        /* Signin button */
        .btn-signin {
            background-color: #3498db;
            color: white;
        }

        .btn-signin:hover {
            background-color: #2980b9;
        }

        /* Admin panel link */
        .admin-link {
            display: inline-block;
            margin-top: 15px;
            color: #2c3e50;
            text-decoration: none;
            font-size: 14px;
        }

        .admin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="home-container">
    <h1>Welcome to Cart System</h1>

    <p>Please sign up or sign in to continue.</p>

    <a href="/signup/" class="btn btn-signup">Create New Account</a>

    <a href="/signin/" class="btn btn-signin">Sign In</a>

    <a href="/admin/" class="admin-link">Admin Panel</a>
</div>

</body>
</html>
